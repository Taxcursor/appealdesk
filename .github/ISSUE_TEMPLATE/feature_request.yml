name: ✨ Feature Request
description: Suggest a new feature or improvement for AppealDesk
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please give as much detail as you can so we can scope this properly — fields marked with * are required.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or pain point this feature addresses.
      placeholder: Currently, Service Providers can't bulk-export litigation status reports, so they have to check each case manually.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see built.
    validations:
      required: true

  - type: checkboxes
    id: module
    attributes:
      label: Affected Area(s)
      description: Check all areas this feature would touch.
      options:
        - label: "Platform Portal — Dashboard"
        - label: "Platform Portal — Service Providers (CA Firms)"
        - label: "Platform Portal — Users"
        - label: "Platform Portal — Admins"
        - label: "Platform Portal — Masters (Acts / Financial Years / Assessment Years)"
        - label: "Platform Portal — Documents"
        - label: "Platform Portal — Audit Logs"
        - label: "Platform Portal — Settings & Branding"
        - label: "SP Portal — Dashboard"
        - label: "SP Portal — Litigations / Appeals (List)"
        - label: "SP Portal — Litigation Detail (Proceedings & Events)"
        - label: "SP Portal — Demand Section"
        - label: "SP Portal — Clients"
        - label: "SP Portal — Team Users"
        - label: "SP Portal — Client Users"
        - label: "SP Portal — Documents (Forms / Templates / Resources)"
        - label: "SP Portal — Masters"
        - label: "SP Portal — Audit Logs"
        - label: "SP Portal — Settings"
        - label: "Authentication / Login / Invite / Password Reset"
        - label: "Document Export (PDF / DOCX / XLSX)"
        - label: "File Uploads / Storage"
        - label: "Email Notifications"
        - label: "Other"

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches or workarounds you've thought about.
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High (needed soon / blocking a workflow)
        - Medium (would meaningfully improve things)
        - Low (nice to have)
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, related issues, or links to similar features elsewhere.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues to make sure this hasn't been requested before
          required: false
